<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="Inter, sans-serif">
	<title>Theme 3 Dark: Harmonious Warm-Cool Palette</title>

	<!-- Background -->
	<rect width="720" height="520" fill="#1b1b1f" rx="8" />

	<!-- Title -->
	<text
		x="360"
		y="32"
		text-anchor="middle"
		font-size="14"
		font-weight="600"
		fill="#dfdfd6"
	>Theme 3 Dark — Warm-Cool Harmony</text>
	<text
		x="360"
		y="50"
		text-anchor="middle"
		font-size="11"
		fill="#98989f"
	>Indigo primary, amber secondary, teal tertiary — full complementary palette</text>

	<!-- ════ Flowchart area ════ -->
	<text x="30" y="82" font-size="11" font-weight="600" fill="#dfdfd6">Flowchart</text>

	<!-- Node A: primary (indigo) -->
	<rect
		x="40"
		y="96"
		width="120"
		height="40"
		rx="5"
		fill="#252540"
		stroke="#a8b1ff"
		stroke-width="1.5"
	/>
	<text x="100" y="121" text-anchor="middle" font-size="12" fill="#dfdfd6">CLI Parse</text>

	<!-- Edge A->B -->
	<line
		x1="160"
		y1="116"
		x2="220"
		y2="116"
		stroke="#98989f"
		stroke-width="1.2"
		marker-end="url(#arrow3d)"
	/>
	<text x="190" y="108" text-anchor="middle" font-size="9" fill="#98989f">args</text>

	<!-- Node B: secondary (warm amber) -->
	<rect
		x="220"
		y="96"
		width="120"
		height="40"
		rx="5"
		fill="#302820"
		stroke="#f9b44e"
		stroke-width="1.5"
	/>
	<text x="280" y="121" text-anchor="middle" font-size="12" fill="#dfdfd6">Validate</text>

	<!-- Edge B->C -->
	<line
		x1="340"
		y1="116"
		x2="400"
		y2="116"
		stroke="#98989f"
		stroke-width="1.2"
		marker-end="url(#arrow3d)"
	/>

	<!-- Node C: tertiary (teal) -->
	<rect
		x="400"
		y="96"
		width="120"
		height="40"
		rx="5"
		fill="#1e2e28"
		stroke="#3dd68c"
		stroke-width="1.5"
	/>
	<text x="460" y="121" text-anchor="middle" font-size="12" fill="#dfdfd6">Execute</text>

	<!-- Diamond node (indigo) -->
	<polygon
		points="600,96 640,116 600,136 560,116"
		fill="#252540"
		stroke="#a8b1ff"
		stroke-width="1.5"
	/>
	<text x="600" y="120" text-anchor="middle" font-size="10" fill="#dfdfd6">ok?</text>

	<!-- Edge C->Diamond -->
	<line
		x1="520"
		y1="116"
		x2="560"
		y2="116"
		stroke="#98989f"
		stroke-width="1.2"
		marker-end="url(#arrow3d)"
	/>

	<!-- Cluster/subgraph (amber tint) -->
	<rect
		x="30"
		y="160"
		width="310"
		height="100"
		rx="6"
		fill="#24221c"
		stroke="#f9b44e"
		stroke-width="1"
		stroke-dasharray="4 2"
	/>
	<text
		x="40"
		y="178"
		font-size="10"
		font-weight="600"
		fill="#f9b44e"
	>subgraph: Config Resolution</text>

	<rect
		x="50"
		y="192"
		width="100"
		height="36"
		rx="5"
		fill="#252540"
		stroke="#a8b1ff"
		stroke-width="1.2"
	/>
	<text x="100" y="214" text-anchor="middle" font-size="11" fill="#dfdfd6">File</text>

	<rect
		x="180"
		y="192"
		width="100"
		height="36"
		rx="5"
		fill="#302820"
		stroke="#f9b44e"
		stroke-width="1.2"
	/>
	<text x="230" y="214" text-anchor="middle" font-size="11" fill="#dfdfd6">Env</text>

	<line
		x1="150"
		y1="210"
		x2="180"
		y2="210"
		stroke="#98989f"
		stroke-width="1"
		marker-end="url(#arrow3d)"
	/>

	<!-- Note (warm amber) -->
	<rect
		x="380"
		y="168"
		width="160"
		height="48"
		rx="3"
		fill="#302820"
		stroke="#f9b44e"
		stroke-width="1"
	/>
	<text
		x="460"
		y="188"
		text-anchor="middle"
		font-size="10"
		fill="#dfdfd6"
	>Note: precedence is</text>
	<text
		x="460"
		y="202"
		text-anchor="middle"
		font-size="10"
		fill="#dfdfd6"
	>argv > env > config</text>

	<!-- ════ Sequence area ════ -->
	<text x="30" y="296" font-size="11" font-weight="600" fill="#dfdfd6">Sequence</text>

	<!-- Actor boxes (alternating) -->
	<rect
		x="60"
		y="310"
		width="80"
		height="32"
		rx="4"
		fill="#252540"
		stroke="#a8b1ff"
		stroke-width="1.2"
	/>
	<text x="100" y="330" text-anchor="middle" font-size="11" fill="#dfdfd6">User</text>

	<rect
		x="240"
		y="310"
		width="80"
		height="32"
		rx="4"
		fill="#302820"
		stroke="#f9b44e"
		stroke-width="1.2"
	/>
	<text x="280" y="330" text-anchor="middle" font-size="11" fill="#dfdfd6">CLI</text>

	<rect
		x="420"
		y="310"
		width="80"
		height="32"
		rx="4"
		fill="#1e2e28"
		stroke="#3dd68c"
		stroke-width="1.2"
	/>
	<text x="460" y="330" text-anchor="middle" font-size="11" fill="#dfdfd6">Plugin</text>

	<!-- Lifelines -->
	<line
		x1="100"
		y1="342"
		x2="100"
		y2="460"
		stroke="#a8b1ff"
		stroke-width="1"
		stroke-dasharray="4 3"
		opacity="0.35"
	/>
	<line
		x1="280"
		y1="342"
		x2="280"
		y2="460"
		stroke="#f9b44e"
		stroke-width="1"
		stroke-dasharray="4 3"
		opacity="0.35"
	/>
	<line
		x1="460"
		y1="342"
		x2="460"
		y2="460"
		stroke="#3dd68c"
		stroke-width="1"
		stroke-dasharray="4 3"
		opacity="0.35"
	/>

	<!-- Message 1 -->
	<line
		x1="100"
		y1="362"
		x2="280"
		y2="362"
		stroke="#dfdfd6"
		stroke-width="1.2"
		marker-end="url(#arrow3d)"
	/>
	<text x="190" y="356" text-anchor="middle" font-size="10" fill="#dfdfd6">run(cmd)</text>

	<!-- Activation (amber) -->
	<rect x="274" y="362" width="12" height="50" fill="#3a3020" stroke="#f9b44e" stroke-width="1" />

	<!-- Message 2 -->
	<line
		x1="280"
		y1="382"
		x2="460"
		y2="382"
		stroke="#dfdfd6"
		stroke-width="1.2"
		marker-end="url(#arrow3d)"
	/>
	<text x="370" y="376" text-anchor="middle" font-size="10" fill="#dfdfd6">hook(pre)</text>

	<!-- Return -->
	<line
		x1="460"
		y1="400"
		x2="280"
		y2="400"
		stroke="#98989f"
		stroke-width="1.2"
		stroke-dasharray="4 2"
		marker-end="url(#arrow3d)"
	/>
	<text x="370" y="394" text-anchor="middle" font-size="10" fill="#98989f">result</text>

	<!-- Message 3 return -->
	<line
		x1="280"
		y1="430"
		x2="100"
		y2="430"
		stroke="#98989f"
		stroke-width="1.2"
		stroke-dasharray="4 2"
		marker-end="url(#arrow3d)"
	/>
	<text x="190" y="424" text-anchor="middle" font-size="10" fill="#98989f">output</text>

	<!-- ════ Gantt snippet ════ -->
	<text x="560" y="296" font-size="11" font-weight="600" fill="#dfdfd6">Gantt</text>

	<!-- Active (indigo) -->
	<rect
		x="560"
		y="310"
		width="140"
		height="20"
		rx="3"
		fill="#5c73e7"
		stroke="#a8b1ff"
		stroke-width="1"
	/>
	<text x="630" y="324" text-anchor="middle" font-size="9" fill="#fff">Parse args</text>

	<!-- Secondary (amber) -->
	<rect
		x="580"
		y="336"
		width="120"
		height="20"
		rx="3"
		fill="#c48a2a"
		stroke="#f9b44e"
		stroke-width="1"
	/>
	<text x="640" y="350" text-anchor="middle" font-size="9" fill="#fff">Validate</text>

	<!-- Tertiary (teal) -->
	<rect
		x="600"
		y="362"
		width="80"
		height="20"
		rx="3"
		fill="#2a8a5a"
		stroke="#3dd68c"
		stroke-width="1"
	/>
	<text x="640" y="376" text-anchor="middle" font-size="9" fill="#fff">Execute</text>

	<!-- Done (neutral) -->
	<rect
		x="560"
		y="394"
		width="140"
		height="20"
		rx="3"
		fill="#202127"
		stroke="#2e2e32"
		stroke-width="1"
	/>
	<text x="630" y="408" text-anchor="middle" font-size="9" fill="#515c67">Done</text>

	<!-- ════ Color swatches ════ -->
	<text x="560" y="440" font-size="9" font-weight="600" fill="#dfdfd6">Palette</text>

	<rect x="560" y="450" width="20" height="14" rx="2" fill="#a8b1ff" />
	<text x="586" y="461" font-size="8" fill="#98989f">indigo</text>

	<rect x="620" y="450" width="20" height="14" rx="2" fill="#f9b44e" />
	<text x="646" y="461" font-size="8" fill="#98989f">amber</text>

	<rect x="560" y="470" width="20" height="14" rx="2" fill="#3dd68c" />
	<text x="586" y="481" font-size="8" fill="#98989f">teal</text>

	<rect x="620" y="470" width="20" height="14" rx="2" fill="#515c67" />
	<text x="646" y="481" font-size="8" fill="#98989f">neutral</text>

	<!-- Arrow marker -->
	<defs>
		<marker id="arrow3d" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
			<path d="M0,0 L8,3 L0,6 Z" fill="#dfdfd6" />
		</marker>
	</defs>

	<!-- Footer -->
	<text
		x="360"
		y="506"
		text-anchor="middle"
		font-size="10"
		fill="#515c67"
	>primaryColor=#252540  secondaryColor=#302820  tertiaryColor=#1e2e28  lineColor=#98989f</text>
</svg>
