<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Hexagon badge with terminal prompt -->
	<defs>
		<linearGradient id="g10" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#3b82f6" />
			<stop offset="100%" stop-color="#1d4ed8" />
		</linearGradient>
		<linearGradient id="g10b" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#6366f1" />
			<stop offset="100%" stop-color="#3b82f6" />
		</linearGradient>
	</defs>
	<!-- Outer hexagon -->
	<polygon
		points="64,6 116,32 116,96 64,122 12,96 12,32"
		fill="url(#g10)"
		stroke="#60a5fa"
		stroke-width="2"
	/>
	<!-- Inner hexagon -->
	<polygon points="64,18 104,40 104,88 64,110 24,88 24,40" fill="#0f172a" opacity="0.8" />
	<!-- Chevron prompt -->
	<polyline
		points="36,54 54,66 36,78"
		stroke="#60a5fa"
		stroke-width="5"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<!-- Cursor line -->
	<line x1="62" y1="76" x2="88" y2="76" stroke="#818cf8" stroke-width="4" stroke-linecap="round" />
	<!-- Dot accent -->
	<circle cx="92" cy="50" r="3" fill="#fbbf24" />
</svg>
