	<!-- Layer 1: CLI (top, brightest) -->
	<path d="M20,40 L64,56 L108,40 L64,24 Z" fill="#3b82f6" opacity="0.9" />
	<!-- Chevron on top layer -->
	<polyline
		points="52,38 62,42 52,46"
		stroke="#fff"
		stroke-width="2.5"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
