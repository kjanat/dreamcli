<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Stacked schema layers (resolution chain as stacked planes) -->
	<defs>
		<linearGradient id="g13a" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#3b82f6" stop-opacity="0.9" />
			<stop offset="100%" stop-color="#3b82f6" stop-opacity="0.4" />
		</linearGradient>
	</defs>
	<!-- Layer 5: default (bottom) -->
	<path d="M20,96 L64,112 L108,96 L64,80 Z" fill="#c084fc" opacity="0.35" />
	<!-- Layer 4: prompt -->
	<path d="M20,82 L64,98 L108,82 L64,66 Z" fill="#a855f7" opacity="0.45" />
	<!-- Layer 3: config -->
	<path d="M20,68 L64,84 L108,68 L64,52 Z" fill="#8b5cf6" opacity="0.55" />
	<!-- Layer 2: env -->
