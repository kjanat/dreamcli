<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Faceted diamond (type safety = precision cut) with inner glow -->
	<defs>
		<linearGradient id="g20a" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#60a5fa" />
			<stop offset="100%" stop-color="#3b82f6" />
		</linearGradient>
		<linearGradient id="g20b" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#93c5fd" />
			<stop offset="100%" stop-color="#6366f1" />
		</linearGradient>
	</defs>
	<!-- Crown (top facets) -->
	<polygon points="64,8 96,40 64,52 32,40" fill="url(#g20b)" opacity="0.9" />
	<!-- Left pavilion -->
	<polygon points="32,40 64,52 64,116" fill="#3b82f6" opacity="0.8" />
	<!-- Right pavilion -->
	<polygon points="96,40 64,52 64,116" fill="#1d4ed8" opacity="0.8" />
	<!-- Top left facet -->
	<polygon points="64,8 32,40 64,52" fill="#93c5fd" opacity="0.3" />
	<!-- Outline -->
	<polygon
		points="64,8 96,40 64,116 32,40"
		stroke="#60a5fa"
		stroke-width="3"
		fill="none"
		stroke-linejoin="round"
	/>
	<line x1="32" y1="40" x2="96" y2="40" stroke="#60a5fa" stroke-width="2" opacity="0.6" />
	<line x1="64" y1="8" x2="64" y2="116" stroke="#60a5fa" stroke-width="1.5" opacity="0.3" />
	<!-- Chevron at center -->
	<polyline
		points="54,56 64,64 54,72"
		stroke="#fff"
		stroke-width="3"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
		opacity="0.8"
	/>
	<!-- Cursor -->
	<line
		x1="67"
		y1="70"
		x2="78"
		y2="70"
		stroke="#fff"
		stroke-width="2.5"
		stroke-linecap="round"
		opacity="0.6"
	/>
</svg>
