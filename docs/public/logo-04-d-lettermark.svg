<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Stylized "D" with terminal angle bracket -->
	<defs>
		<linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#3b82f6" />
			<stop offset="100%" stop-color="#8b5cf6" />
		</linearGradient>
	</defs>
	<!-- D shape -->
	<path
		d="M32,16 L32,112 L68,112 C94,112 112,92 112,64 C112,36 94,16 68,16 Z"
		stroke="url(#g4)"
		stroke-width="8"
		fill="none"
		stroke-linecap="round"
		stroke-linejoin="round"
	/>
	<!-- Terminal chevron inside the D -->
	<polyline
		points="48,50 62,64 48,78"
		stroke="#60a5fa"
		stroke-width="5"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<!-- Cursor -->
	<line x1="68" y1="76" x2="86" y2="76" stroke="#60a5fa" stroke-width="4" stroke-linecap="round" />
</svg>
