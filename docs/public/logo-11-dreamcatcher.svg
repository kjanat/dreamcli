<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Dreamcatcher with terminal web -->
	<circle cx="64" cy="56" r="40" stroke="#3b82f6" stroke-width="4" fill="none" />
	<circle cx="64" cy="56" r="28" stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6" />
	<circle cx="64" cy="56" r="16" stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.4" />
	<!-- Web lines -->
	<line x1="64" y1="16" x2="64" y2="96" stroke="#6366f1" stroke-width="1.5" opacity="0.3" />
	<line x1="24" y1="56" x2="104" y2="56" stroke="#6366f1" stroke-width="1.5" opacity="0.3" />
	<line x1="36" y1="28" x2="92" y2="84" stroke="#6366f1" stroke-width="1.5" opacity="0.3" />
	<line x1="92" y1="28" x2="36" y2="84" stroke="#6366f1" stroke-width="1.5" opacity="0.3" />
	<!-- Chevron at center -->
	<polyline
		points="56,50 66,56 56,62"
		stroke="#60a5fa"
		stroke-width="3.5"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<line x1="69" y1="61" x2="78" y2="61" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" />
	<!-- Hanging feathers/threads -->
	<line x1="44" y1="96" x2="38" y2="118" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" />
	<line x1="64" y1="96" x2="64" y2="122" stroke="#6366f1" stroke-width="2" stroke-linecap="round" />
	<line x1="84" y1="96" x2="90" y2="118" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" />
	<!-- Beads -->
	<circle cx="38" cy="118" r="3" fill="#fbbf24" />
	<circle cx="64" cy="122" r="3" fill="#fbbf24" />
	<circle cx="90" cy="118" r="3" fill="#fbbf24" />
</svg>
