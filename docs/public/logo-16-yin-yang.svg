<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Yin-yang: schema (define) and runtime (execute) -->
	<defs>
		<linearGradient id="g16" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#3b82f6" />
			<stop offset="100%" stop-color="#1d4ed8" />
		</linearGradient>
	</defs>
	<!-- Outer circle -->
	<circle cx="64" cy="64" r="48" stroke="#3b82f6" stroke-width="4" fill="none" />
	<!-- Yin half (left/top — dark = runtime) -->
	<path d="M64,16 A48,48 0 0,0 64,112 A24,24 0 0,1 64,64 A24,24 0 0,0 64,16 Z" fill="#1e293b" />
	<!-- Yang half (right/bottom — blue = schema) -->
	<path d="M64,16 A48,48 0 0,1 64,112 A24,24 0 0,0 64,64 A24,24 0 0,1 64,16 Z" fill="url(#g16)" />
	<!-- Yin dot (chevron on dark side) -->
	<polyline
		points="56,38 64,44 56,50"
		stroke="#60a5fa"
		stroke-width="3"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<!-- Yang dot (moon on blue side) -->
	<circle cx="64" cy="84" r="7" fill="#0f172a" />
	<circle cx="68" cy="81" r="5.5" fill="#1d4ed8" />
</svg>
