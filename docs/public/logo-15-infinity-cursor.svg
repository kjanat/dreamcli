<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Infinity loop with cursor, representing endless pipeline -->
	<defs>
		<linearGradient id="g15" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#3b82f6" />
			<stop offset="50%" stop-color="#8b5cf6" />
			<stop offset="100%" stop-color="#3b82f6" />
		</linearGradient>
	</defs>
	<!-- Infinity path -->
	<path
		d="M32,64 C32,44 48,36 58,48 L70,60 C80,72 96,64 96,44 C96,28 80,20 70,32 L58,44 C48,56 32,48 32,64 Z"
		stroke="url(#g15)"
		stroke-width="6"
		fill="none"
		stroke-linecap="round"
		transform="translate(0,12)"
	/>
	<!-- Mirror bottom -->
	<path
		d="M32,64 C32,84 48,92 58,80 L70,68 C80,56 96,64 96,84 C96,100 80,108 70,96 L58,84 C48,72 32,80 32,64 Z"
		stroke="url(#g15)"
		stroke-width="6"
		fill="none"
		stroke-linecap="round"
		transform="translate(0,12)"
		opacity="0.4"
	/>
	<!-- Cursor block at crossover -->
	<rect x="58" y="62" width="12" height="18" rx="2" fill="#3b82f6" opacity="0.8" />
	<!-- Sparkle -->
	<circle cx="100" cy="32" r="3" fill="#fbbf24" />
	<circle cx="28" cy="98" r="2" fill="#fbbf24" opacity="0.5" />
</svg>
