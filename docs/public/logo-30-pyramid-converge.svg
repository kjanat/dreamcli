<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Isometric pyramid — layers converge to apex point -->
	<!-- Base layer (widest) -->
	<path d="M12,100 L64,116 L116,100 L64,84 Z" fill="#fbbf24" opacity="0.2" />
	<!-- Layer 2 -->
	<path d="M24,84 L64,96 L104,84 L64,72 Z" fill="#d946ef" opacity="0.3" />
	<!-- Layer 3 -->
	<path d="M36,68 L64,78 L92,68 L64,58 Z" fill="#a855f7" opacity="0.45" />
	<!-- Layer 4 -->
	<path d="M46,54 L64,62 L82,54 L64,46 Z" fill="#7c3aed" opacity="0.65" />
	<!-- Apex -->
	<path d="M56,40 L64,46 L72,40 L64,34 Z" fill="#7c3aed" opacity="0.85" />
	<!-- Convergence beam up from apex -->
	<line
		x1="64"
		y1="34"
		x2="64"
		y2="12"
		stroke="#fbbf24"
		stroke-width="3"
		stroke-linecap="round"
		opacity="0.8"
	/>
	<!-- Star at top -->
	<circle cx="64" cy="10" r="4" fill="#fbbf24" />
	<!-- Edge lines for depth -->
	<line x1="64" y1="116" x2="64" y2="46" stroke="#e9d5ff" stroke-width="1" opacity="0.15" />
	<line x1="12" y1="100" x2="56" y2="40" stroke="#e9d5ff" stroke-width="1" opacity="0.1" />
	<line x1="116" y1="100" x2="72" y2="40" stroke="#e9d5ff" stroke-width="1" opacity="0.1" />
</svg>
