			<stop offset="0%" stop-color="#60a5fa" />
			<stop offset="100%" stop-color="#3b82f6" />
		</linearGradient>
	</defs>
	<path
		d="M30,82 C14,82 6,70 12,58 C8,44 22,32 36,36 C42,22 62,18 74,28 C84,20 102,24 106,40 C118,42 124,56 116,68 C122,80 114,90 100,86 L30,86 Z"
