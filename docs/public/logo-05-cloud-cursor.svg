	/>
	<!-- Stars below cloud -->
	<circle cx="40" cy="104" r="2.5" fill="#fbbf24" opacity="0.5" />
	<circle cx="64" cy="110" r="2" fill="#fbbf24" opacity="0.4" />
	<circle cx="88" cy="106" r="3" fill="#fbbf24" opacity="0.6" />
</svg>
