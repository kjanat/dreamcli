		stroke="#fff"
		stroke-width="4"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<line
		x1="56"
		y1="74"
		x2="78"
		y2="74"
		stroke="#fff"
		stroke-width="4"
		stroke-linecap="round"
