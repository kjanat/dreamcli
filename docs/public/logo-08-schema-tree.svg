			<stop offset="0%" stop-color="#3b82f6" />
			<stop offset="100%" stop-color="#a855f7" />
		</linearGradient>
	</defs>
	<!-- Root node -->
	<circle cx="22" cy="64" r="10" fill="url(#g8)" />
	<!-- Branches -->
	<line x1="32" y1="52" x2="60" y2="28" stroke="#3b82f6" stroke-width="3" />
	<line x1="32" y1="58" x2="60" y2="48" stroke="#6366f1" stroke-width="3" />
	<line x1="32" y1="64" x2="60" y2="68" stroke="#8b5cf6" stroke-width="3" />
