<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Interlocked "dc" monogram -->
	<defs>
		<linearGradient id="g14" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#3b82f6" />
			<stop offset="100%" stop-color="#8b5cf6" />
		</linearGradient>
	</defs>
	<!-- "d" — left half, large -->
	<path d="M56,20 L56,108" stroke="url(#g14)" stroke-width="7" stroke-linecap="round" />
	<path
		d="M56,32 C82,32 96,46 96,64 C96,82 82,96 56,96"
		stroke="url(#g14)"
		stroke-width="7"
		stroke-linecap="round"
		fill="none"
	/>
	<!-- "c" — overlapping right, slightly offset -->
	<path
		d="M84,44 C68,32 48,36 42,52 C36,68 44,86 64,92"
		stroke="#60a5fa"
		stroke-width="5"
		stroke-linecap="round"
		fill="none"
		opacity="0.7"
	/>
	<!-- Cursor dot -->
	<circle cx="68" cy="92" r="4" fill="#fbbf24" />
</svg>
