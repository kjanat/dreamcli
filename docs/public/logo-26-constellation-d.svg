	<circle cx="88" cy="28" r="3.5" fill="#e9d5ff" />
	<circle cx="98" cy="50" r="3.5" fill="#2dd4bf" />
	<circle cx="100" cy="76" r="3.5" fill="#2dd4bf" />
	<circle cx="88" cy="98" r="3.5" fill="#e9d5ff" />
