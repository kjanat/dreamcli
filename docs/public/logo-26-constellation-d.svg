	<line x1="88" y1="98" x2="64" y2="112" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" />
	<line x1="64" y1="112" x2="36" y2="112" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" />
