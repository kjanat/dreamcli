	<circle cx="36" cy="20" r="4" fill="#fbbf24" />
	<circle cx="36" cy="44" r="3" fill="#e9d5ff" />
	<circle cx="36" cy="68" r="3" fill="#e9d5ff" />
	<circle cx="36" cy="92" r="3" fill="#e9d5ff" />
