<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Pebble orbit — rounded shapes orbiting a center -->
	<!-- Orbital ring -->
	<ellipse
		cx="64"
		cy="64"
		rx="48"
		ry="20"
		stroke="#2b2b2b"
		stroke-width="3"
		fill="none"
		opacity="0.2"
		transform="rotate(-25 64 64)"
	/>
	<ellipse
		cx="64"
		cy="64"
		rx="48"
		ry="20"
		stroke="#2b2b2b"
		stroke-width="3"
		fill="none"
		opacity="0.2"
		transform="rotate(25 64 64)"
	/>
	<!-- Pebble satellites -->
	<circle cx="22" cy="52" r="8" fill="#2b2b2b" opacity="0.3" />
	<circle cx="106" cy="52" r="8" fill="#2b2b2b" opacity="0.3" />
	<circle cx="36" cy="92" r="7" fill="#2b2b2b" opacity="0.25" />
	<circle cx="92" cy="92" r="7" fill="#2b2b2b" opacity="0.25" />
	<circle cx="64" cy="28" r="6" fill="#2b2b2b" opacity="0.2" />
	<!-- Center: amber focal point -->
	<circle cx="64" cy="64" r="12" fill="#D6A24A" />
</svg>
