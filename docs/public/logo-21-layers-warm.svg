<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Stacked isometric layers — warm amber/violet gradient -->
	<!-- Layer 5: default (bottom) -->
	<path d="M20,96 L64,112 L108,96 L64,80 Z" fill="#fbbf24" opacity="0.25" />
	<!-- Layer 4: prompt -->
	<path d="M20,82 L64,98 L108,82 L64,66 Z" fill="#f59e0b" opacity="0.35" />
	<!-- Layer 3: config -->
	<path d="M20,68 L64,84 L108,68 L64,52 Z" fill="#d946ef" opacity="0.45" />
	<!-- Layer 2: env -->
	<path d="M20,54 L64,70 L108,54 L64,38 Z" fill="#a855f7" opacity="0.6" />
	<!-- Layer 1: CLI (top) -->
	<path d="M20,40 L64,56 L108,40 L64,24 Z" fill="#7c3aed" opacity="0.85" />
	<!-- Edge highlights -->
	<path d="M64,24 L108,40 L64,56" stroke="#c4b5fd" stroke-width="1" fill="none" opacity="0.4" />
	<!-- Chevron on top layer -->
	<polyline
		points="52,38 62,42 52,46"
		stroke="#fde68a"
		stroke-width="2.5"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<line
		x1="65"
		y1="45"
		x2="76"
		y2="45"
		stroke="#fde68a"
		stroke-width="2"
		stroke-linecap="round"
		opacity="0.7"
	/>
</svg>
