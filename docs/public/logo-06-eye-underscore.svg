<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Abstract eye (dream/vision) with terminal underscore cursor -->
	<defs>
		<linearGradient id="g6" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0%" stop-color="#3b82f6" />
			<stop offset="100%" stop-color="#8b5cf6" />
		</linearGradient>
	</defs>
	<!-- Eye outline -->
	<path d="M8,64 Q64,16 120,64 Q64,112 8,64 Z" stroke="url(#g6)" stroke-width="5" fill="none" />
	<!-- Iris -->
	<circle cx="64" cy="64" r="18" fill="#3b82f6" opacity="0.15" />
	<circle cx="64" cy="64" r="18" stroke="#3b82f6" stroke-width="3" fill="none" />
	<!-- Pupil: angle bracket -->
	<polyline
		points="56,58 66,64 56,70"
		stroke="#3b82f6"
		stroke-width="3.5"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<!-- Cursor underscore below eye -->
	<line
		x1="44"
		y1="102"
		x2="84"
		y2="102"
		stroke="#8b5cf6"
		stroke-width="5"
		stroke-linecap="round"
	/>
</svg>
