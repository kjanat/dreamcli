<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Soft trefoil knot — three rounded lobes interlocking -->
	<circle
		cx="52"
		cy="44"
		r="24"
		stroke="#2b2b2b"
		stroke-width="6"
		fill="none"
		stroke-linecap="round"
	/>
	<circle
		cx="76"
		cy="44"
		r="24"
		stroke="#2b2b2b"
		stroke-width="6"
		fill="none"
		stroke-linecap="round"
	/>
	<circle
		cx="64"
		cy="68"
		r="24"
		stroke="#2b2b2b"
		stroke-width="6"
		fill="none"
		stroke-linecap="round"
	/>
	<!-- Overlap covers to create knot illusion -->
	<!-- Top crossing: right over left -->
	<path d="M64,20 A24,24 0 0,1 76,24" stroke="#2b2b2b" stroke-width="7" fill="none" />
	<!-- Bottom-left crossing -->
	<path d="M40,60 A24,24 0 0,1 44,72" stroke="#2b2b2b" stroke-width="7" fill="none" />
	<!-- Amber accent: center convergence dot -->
	<circle cx="64" cy="52" r="7" fill="#D6A24A" />
</svg>
