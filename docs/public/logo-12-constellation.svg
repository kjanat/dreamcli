<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Constellation forming a terminal/chevron shape -->
	<!-- Star nodes -->
	<circle cx="18" cy="36" r="4" fill="#fbbf24" />
	<circle cx="18" cy="92" r="4" fill="#fbbf24" />
	<circle cx="52" cy="64" r="5" fill="#fbbf24" />
	<circle cx="78" cy="88" r="3.5" fill="#fbbf24" />
	<circle cx="100" cy="88" r="3.5" fill="#fbbf24" />
	<circle cx="110" cy="32" r="3" fill="#fbbf24" opacity="0.6" />
	<circle cx="92" cy="48" r="2.5" fill="#fbbf24" opacity="0.5" />
	<circle cx="72" cy="28" r="2" fill="#fbbf24" opacity="0.4" />
	<!-- Constellation lines (chevron shape) -->
	<line x1="18" y1="36" x2="52" y2="64" stroke="#60a5fa" stroke-width="2" opacity="0.7" />
	<line x1="52" y1="64" x2="18" y2="92" stroke="#60a5fa" stroke-width="2" opacity="0.7" />
	<!-- Cursor line -->
	<line x1="78" y1="88" x2="100" y2="88" stroke="#60a5fa" stroke-width="2" opacity="0.7" />
	<!-- Faint background connections -->
	<line x1="52" y1="64" x2="92" y2="48" stroke="#3b82f6" stroke-width="1" opacity="0.2" />
	<line x1="92" y1="48" x2="110" y2="32" stroke="#3b82f6" stroke-width="1" opacity="0.2" />
	<line x1="72" y1="28" x2="110" y2="32" stroke="#3b82f6" stroke-width="1" opacity="0.2" />
	<line x1="72" y1="28" x2="52" y2="64" stroke="#3b82f6" stroke-width="1" opacity="0.15" />
	<!-- Tiny scattered stars -->
	<circle cx="40" cy="18" r="1" fill="#fbbf24" opacity="0.3" />
	<circle cx="116" cy="64" r="1.5" fill="#fbbf24" opacity="0.25" />
	<circle cx="86" cy="108" r="1" fill="#fbbf24" opacity="0.2" />
	<circle cx="30" cy="110" r="1.2" fill="#fbbf24" opacity="0.2" />
</svg>
