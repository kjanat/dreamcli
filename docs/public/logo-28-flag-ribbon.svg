<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Flag with flowing ribbon tail -->
	<defs>
		<linearGradient id="g28" x1="0" y1="0" x2="1" y2="0.5">
			<stop offset="0%" stop-color="#9333ea" />
			<stop offset="100%" stop-color="#c084fc" />
		</linearGradient>
	</defs>
	<!-- Pole -->
	<line x1="20" y1="12" x2="20" y2="100" stroke="#a1a1aa" stroke-width="3" stroke-linecap="round" />
	<!-- Flag body -->
	<path d="M20,16 L88,22 L82,44 L88,66 L20,60 Z" fill="url(#g28)" />
	<!-- Ribbon tails -->
	<path
		d="M88,22 C96,26 104,36 98,46"
		stroke="#d8b4fe"
		stroke-width="2.5"
		stroke-linecap="round"
		fill="none"
		opacity="0.6"
	/>
	<path
		d="M88,66 C96,62 108,70 102,82"
		stroke="#d8b4fe"
		stroke-width="2.5"
		stroke-linecap="round"
		fill="none"
		opacity="0.5"
	/>
	<!-- Chevron on flag -->
	<polyline
		points="34,34 46,40 34,46"
		stroke="#fde68a"
		stroke-width="3"
		stroke-linecap="round"
		stroke-linejoin="round"
		fill="none"
	/>
	<line
		x1="50"
		y1="44"
		x2="66"
		y2="44"
		stroke="#fde68a"
		stroke-width="2.5"
		stroke-linecap="round"
		opacity="0.7"
	/>
	<!-- Accent dots -->
	<circle cx="102" cy="82" r="3" fill="#fbbf24" opacity="0.7" />
	<circle cx="98" cy="46" r="2.5" fill="#2dd4bf" opacity="0.6" />
	<!-- Base marks -->
	<line x1="12" y1="96" x2="18" y2="96" stroke="#71717a" stroke-width="2" stroke-linecap="round" />
	<line
		x1="12"
		y1="100"
		x2="18"
		y2="100"
		stroke="#71717a"
		stroke-width="2"
		stroke-linecap="round"
	/>
</svg>
