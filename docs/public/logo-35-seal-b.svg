<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Rounded cutout seal — ring with single soft notch -->
	<!-- Thick ring -->
	<circle cx="64" cy="64" r="46" stroke="#2b2b2b" stroke-width="12" fill="none" opacity="0.85" />
	<!-- Soft notch/gap (white cover on ring) -->
	<circle cx="64" cy="16" r="14" fill="white" />
	<!-- Amber dot sitting in the gap -->
	<circle cx="64" cy="18" r="7" fill="#D6A24A" />
</svg>
