<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Constellation chevron — violet/teal palette -->
	<!-- Star nodes -->
	<circle cx="16" cy="34" r="4.5" fill="#e9d5ff" />
	<circle cx="16" cy="94" r="4.5" fill="#e9d5ff" />
	<circle cx="54" cy="64" r="5.5" fill="#fbbf24" />
	<circle cx="82" cy="90" r="3.5" fill="#e9d5ff" />
	<circle cx="106" cy="90" r="3.5" fill="#e9d5ff" />
	<!-- Connecting lines (chevron) -->
	<line x1="16" y1="34" x2="54" y2="64" stroke="#a78bfa" stroke-width="2.5" opacity="0.7" />
	<line x1="54" y1="64" x2="16" y2="94" stroke="#a78bfa" stroke-width="2.5" opacity="0.7" />
	<!-- Cursor line -->
	<line x1="82" y1="90" x2="106" y2="90" stroke="#a78bfa" stroke-width="2.5" opacity="0.7" />
	<!-- Accent stars -->
	<circle cx="96" cy="32" r="2.5" fill="#2dd4bf" opacity="0.7" />
	<circle cx="112" cy="50" r="2" fill="#2dd4bf" opacity="0.5" />
	<circle cx="74" cy="24" r="1.8" fill="#fbbf24" opacity="0.5" />
	<circle cx="42" cy="16" r="1.5" fill="#e9d5ff" opacity="0.3" />
	<circle cx="110" cy="72" r="1.2" fill="#e9d5ff" opacity="0.25" />
	<circle cx="62" cy="108" r="1.5" fill="#2dd4bf" opacity="0.3" />
	<circle cx="34" cy="112" r="1" fill="#e9d5ff" opacity="0.2" />
</svg>
