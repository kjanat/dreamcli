<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Flag pole with constellation stars on the flag -->
	<defs>
		<linearGradient id="g24" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#7c3aed" />
			<stop offset="100%" stop-color="#a855f7" />
		</linearGradient>
	</defs>
	<!-- Pole -->
	<line
		x1="24"
		y1="14"
		x2="24"
		y2="114"
		stroke="#a1a1aa"
		stroke-width="3.5"
		stroke-linecap="round"
	/>
	<!-- Flag shape -->
	<path d="M24,18 L100,18 Q90,44 100,70 L24,70 Z" fill="url(#g24)" opacity="0.85" />
	<!-- Constellation on flag -->
	<circle cx="44" cy="32" r="3" fill="#fde68a" />
	<circle cx="68" cy="28" r="2.5" fill="#fde68a" />
	<circle cx="56" cy="48" r="3.5" fill="#fde68a" />
	<circle cx="80" cy="52" r="2" fill="#fde68a" opacity="0.7" />
	<circle cx="48" cy="62" r="2" fill="#fde68a" opacity="0.6" />
	<!-- Connections -->
	<line x1="44" y1="32" x2="68" y2="28" stroke="#e9d5ff" stroke-width="1.2" opacity="0.5" />
	<line x1="44" y1="32" x2="56" y2="48" stroke="#e9d5ff" stroke-width="1.2" opacity="0.5" />
	<line x1="68" y1="28" x2="56" y2="48" stroke="#e9d5ff" stroke-width="1.2" opacity="0.5" />
	<line x1="56" y1="48" x2="80" y2="52" stroke="#e9d5ff" stroke-width="1.2" opacity="0.4" />
	<!-- Double dash at base -->
	<line
		x1="14"
		y1="108"
		x2="20"
		y2="108"
		stroke="#71717a"
		stroke-width="2.5"
		stroke-linecap="round"
	/>
	<line
		x1="14"
		y1="114"
		x2="20"
		y2="114"
		stroke="#71717a"
		stroke-width="2.5"
		stroke-linecap="round"
	/>
</svg>
