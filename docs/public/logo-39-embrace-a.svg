<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
	<!-- Nested embrace — concentric curved brackets wrapping center -->
	<!-- Left arcs -->
	<path
		d="M48,28 C28,44 28,84 48,100"
		stroke="#2b2b2b"
		stroke-width="4"
		fill="none"
		stroke-linecap="round"
		opacity="0.7"
	/>
	<path
		d="M36,20 C12,42 12,86 36,108"
		stroke="#2b2b2b"
		stroke-width="3.5"
		fill="none"
		stroke-linecap="round"
		opacity="0.35"
	/>
	<!-- Right arcs -->
	<path
		d="M80,28 C100,44 100,84 80,100"
		stroke="#2b2b2b"
		stroke-width="4"
		fill="none"
		stroke-linecap="round"
		opacity="0.7"
	/>
	<path
		d="M92,20 C116,42 116,86 92,108"
		stroke="#2b2b2b"
		stroke-width="3.5"
		fill="none"
		stroke-linecap="round"
		opacity="0.35"
	/>
	<!-- Amber center -->
	<circle cx="64" cy="64" r="10" fill="#D6A24A" />
</svg>
