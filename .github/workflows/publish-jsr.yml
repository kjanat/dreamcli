name: Publish to JSR

on:
  release: { types: [published] }
  workflow_dispatch:

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs: { meta: "${{ steps.version.outputs.meta }}" }
    steps:
      - uses: actions/checkout@v6
      - name: Resolve metadata and validate release tag
        id: version
        env: { RELEASE_TAG: "${{ github.event.release.tag_name }}" }
        run: bash scripts/release-meta.sh jsr

  publish:
    name: Publish
    needs: [meta]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: { name: jsr, url: "${{ fromJSON(needs.meta.outputs.meta).url }}" }
    permissions:
      contents: read
      id-token: write # OIDC provenance for JSR
    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run scripts/check-version-sync.ts
      - run: bun --bun run ci
      - name: Deno adapter smoke test
        run: deno run --config packages/dreamcli/deno.json --allow-read --allow-env scripts/deno-smoke-test.ts

      - name: Publish to JSR
        run: deno publish
        working-directory: packages/dreamcli
