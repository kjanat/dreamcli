name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.version.outputs.package }}
      version: ${{ steps.version.outputs.version }}
      url: ${{ steps.version.outputs.url }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve npm package version
        id: version
        run: |
          package=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          {
            echo "package=$package"
            echo "version=$version"
            echo "url=https://www.npmjs.com/package/$package/v/$version"
          } >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    needs: [meta]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: npm
      url: ${{ needs.meta.outputs.url }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - uses: actions/setup-node@v6
        with:
          node-version: 22.22.2
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile
      - run: bun run scripts/check-version-sync.ts
      - run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
