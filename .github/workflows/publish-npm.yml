name: Publish to npm

on:
  release: { types: [published] }
  workflow_dispatch:

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs: { meta: "${{ steps.version.outputs.meta }}" }
    steps:
      - uses: actions/checkout@v6
      - name: Resolve metadata and validate release tag
        id: version
        env: { RELEASE_TAG: "${{ github.event.release.tag_name }}" }
        run: bash scripts/release-meta.sh npm

  build:
    name: Build
    needs: [meta]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs: { tarball: "${{ steps.pack.outputs.tarball }}" }
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun scripts/emit-definition-schema.ts
      - run: bun run scripts/check-version-sync.ts
      - run: bun run build
      - name: Pack tarball
        id: pack
        run: echo "tarball=$(bun pm pack --quiet --ignore-scripts | tr -d '[:space:]')" >> "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@v7
        with:
          name: tarball
          path: ${{ steps.pack.outputs.tarball }}
          retention-days: 1

  publish:
    name: Publish
    needs: [meta, build]
    env: { TARBALL: "${{ needs.build.outputs.tarball }}" }
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: { name: npm, url: "${{ fromJSON(needs.meta.outputs.meta).url }}" }
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-node@v6
        with: { node-version: lts/*, registry-url: https://registry.npmjs.org/ }
      - uses: actions/download-artifact@v8
        with: { name: tarball }
      - run: npm i -g npm@latest
      - name: Publish to npm
        run: npm publish "${TARBALL}" --provenance --access public
