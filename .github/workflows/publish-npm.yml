name: Publish to npm

on:
  release: { types: [published] }
  workflow_dispatch:

jobs:
  meta:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs: { meta: "${{ steps.version.outputs.meta }}" }
    steps:
      - uses: actions/checkout@v6
      - name: Resolve metadata and validate release tag
        id: version
        env: { RELEASE_TAG: "${{ github.event.release.tag_name }}" }
        run: bash scripts/release-meta.sh npm

  publish:
    name: Publish
    needs: [meta]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: { name: npm, url: "${{ fromJSON(needs.meta.outputs.meta).url }}" }
    env: { REGISTRY: "${{ vars.REGISTRY }}" }
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - run: bun run scripts/check-version-sync.ts
      - run: bun run ci

      - name: Publish to npm
        run: bunx npm@latest publish --provenance --access public
