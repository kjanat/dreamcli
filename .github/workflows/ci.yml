name: CI

on:
  push: { branches: [master] }
  pull_request: { branches: [master] }

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Static checks — Bun-only fast path for type/lint/format/version sync
  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Static Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Version sync (package.json ↔ deno.jsonc)
        run: bun run scripts/check-version-sync.ts
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check

  # ─────────────────────────────────────────────────────────────────
  # Execution tests — runtime matrix across Bun stable and Node 22/current
  #
  # vitest runs natively on both Node and Bun. The test suite
  # exercises shared CLI/testkit/runtime behavior on those runtimes.
  # Real Deno verification lives in the dedicated Deno job below.
  # ─────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        runtime: [bun, node]
        node-version: [22.22.2, latest]
        exclude: [{ runtime: bun, node-version: 22.22.2 }]
    steps:
      - uses: actions/checkout@v6

      # Always install Bun for dependency management (bun install)
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - uses: actions/setup-node@v6
        if: matrix.runtime == 'node'
        with: { node-version: "${{ matrix.node-version }}" }

      - run: bun install --frozen-lockfile

      # Bun: execute Vitest with Bun directly.
      # `bun run test` would hit node_modules/.bin/vitest, whose shebang is
      # `#!/usr/bin/env node`, and therefore use the runner's Node binary.
      - name: Test (Bun)
        if: matrix.runtime == 'bun'
        run: bunx --bun vitest run

      # Node: run vitest via npx (uses Node, not Bun, as the runtime)
      - name: Test (Node ${{ matrix.node-version }})
        if: matrix.runtime == 'node'
        run: npx vitest run

  # ─────────────────────────────────────────────────────────────────
  # Coverage — single Node floor run with explicit thresholds
  #
  # Coverage is intentionally measured on Node because Vitest's v8
  # provider depends on Node inspector APIs.
  # ─────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with: { node-version: "latest" }
      - run: bun install --frozen-lockfile
      - run: bun run coverage

  # ─────────────────────────────────────────────────────────────────
  # Deno smoke — real runtime proof for the built Deno adapter path
  #
  # Build first, then run the smoke script against the built package.
  # The final command also proves the Vitest CLI can execute from Deno's
  # npm bridge in this environment.
  # ─────────────────────────────────────────────────────────────────
  test-deno:
    name: Test (deno)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: denoland/setup-deno@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Deno adapter smoke test
        run: deno run --allow-read --allow-env scripts/deno-smoke-test.ts
      - run: deno run -A npm:vitest run

  # ─────────────────────────────────────────────────────────────────
  # Docs — regenerate checked-in artifacts, assert clean tree, then build
  # ─────────────────────────────────────────────────────────────────
  docs:
    name: Docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run docs:build

  # ─────────────────────────────────────────────────────────────────
  # Build — verifies the package builds, types are correct, and
  # package.json exports are valid (publint + attw)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, test, coverage, test-deno, docs]
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
