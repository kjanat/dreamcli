#:schema https://www.schemastore.org/bunfig.json

telemetry = false
smol      = false

[install]
auto          = "auto"
# We don't have ANY dependencies, so this doesn't matter. I want up-to-date devtools.
exact         = false
lockfile.save = true

[run]
silent = true

[test]
coverage         = true
coverageReporter = ["text", "lcov"]
reporter.dots    = false
reporter.junit   = ".bucket/test-results.xml"
coverageDir      = ".bucket/coverage"
randomize        = true
rerunEach        = 3
